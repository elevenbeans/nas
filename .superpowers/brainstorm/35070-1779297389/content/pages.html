<h2>NAS 管理界面 - 想要哪些页面？</h2>
<p class="subtitle">选择你需要的功能模块，可以多选</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="dashboard" onclick="toggleSelect(this)">
    <div class="letter">📊</div>
    <div class="content">
      <h3>仪表盘</h3>
      <p>系统状态总览：硬盘容量、服务状态、网络信息</p>
    </div>
  </div>
  <div class="option" data-choice="files" onclick="toggleSelect(this)">
    <div class="letter">📁</div>
    <div class="content">
      <h3>文件管理</h3>
      <p>浏览/上传/下载 NAS 文件（替代 Finder 部分功能）</p>
    </div>
  </div>
  <div class="option" data-choice="media" onclick="toggleSelect(this)">
    <div class="letter">🎬</div>
    <div class="content">
      <h3>媒体库</h3>
      <p>Jellyfin 集成：视频/照片列表，直接播放</p>
    </div>
  </div>
  <div class="option" data-choice="backups" onclick="toggleSelect(this)">
    <div class="letter">💾</div>
    <div class="content">
      <h3>备份管理</h3>
      <p>查看备份状态、触发手动备份</p>
    </div>
  </div>
  <div class="option" data-choice="photos" onclick="toggleSelect(this)">
    <div class="letter">📸</div>
    <div class="content">
      <h3>照片墙</h3>
      <p>照片时间线浏览、相册管理</p>
    </div>
  </div>
  <div class="option" data-choice="settings" onclick="toggleSelect(this)">
    <div class="letter">⚙️</div>
    <div class="content">
      <h3>系统设置</h3>
      <p>用户管理、SMB/Jellyfin 配置、关机重启</p>
    </div>
  </div>
</div>
