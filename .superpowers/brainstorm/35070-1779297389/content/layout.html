<h2>导航布局偏好</h2>
<p class="subtitle">界面结构选哪种？</p>

<div class="options">
  <div class="option" data-choice="sidebar" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>侧边栏导航</h3>
      <p>左侧菜单栏 + 右侧内容区，多页面切换方便</p>
      <div class="pros-cons" style="margin-top:0.5rem;font-size:0.9em">
        <div class="pros"><h4>👍</h4><ul><li>桌面端体验好</li><li>导航清晰</li></ul></div>
        <div class="cons"><h4>👎</h4><ul><li>小屏幕占空间</li></ul></div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="topnav" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>顶部导航</h3>
      <p>顶栏标签切换，类似浏览器标签页</p>
      <div class="pros-cons" style="margin-top:0.5rem;font-size:0.9em">
        <div class="pros"><h4>👍</h4><ul><li>简洁</li><li>移动端友好</li></ul></div>
        <div class="cons"><h4>👎</h4><ul><li>页面多时拥挤</li></ul></div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="hybrid" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合布局</h3>
      <p>桌面端侧边栏，移动端底部导航</p>
      <div class="pros-cons" style="margin-top:0.5rem;font-size:0.9em">
        <div class="pros"><h4>👍</h4><ul><li>自适应各设备</li><li>最佳用户体验</li></ul></div>
        <div class="cons"><h4>👎</h4><ul><li>实现稍复杂</li></ul></div>
      </div>
    </div>
  </div>
</div>
