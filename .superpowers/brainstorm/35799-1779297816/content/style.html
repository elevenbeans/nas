<h2>UI 风格偏好</h2>
<p class="subtitle">先选整体方向</p>

<div class="options">
  <div class="option" data-choice="dark-modern" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>深色现代风 🖤</h3>
      <p>暗色背景 + 高亮彩色点缀，类似 Vercel / Synology DSM 风格</p>
      <div class="pros-cons" style="margin-top:0.5rem;font-size:0.9em">
        <div class="pros"><h4>👍</h4><ul><li>NAS 感强</li><li>护眼</li></ul></div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="light-clean" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>浅色简洁风 ☀️</h3>
      <p>白底 + 柔和灰色，类似 Apple 设计风格</p>
      <div class="pros-cons" style="margin-top:0.5rem;font-size:0.9em">
        <div class="pros"><h4>👍</h4><ul><li>清新</li><li>家人更容易接受</li></ul></div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="glassmorphism" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>毛玻璃风 🪟</h3>
      <p>模糊背景 + 半透明卡片，现代感最强</p>
      <div class="pros-cons" style="margin-top:0.5rem;font-size:0.9em">
        <div class="pros"><h4>👍</h4><ul><li>视觉惊艳</li></ul></div>
        <div class="cons"><h4>👎</h4><ul><li>实现稍复杂</li></ul></div>
      </div>
    </div>
  </div>
</div>
