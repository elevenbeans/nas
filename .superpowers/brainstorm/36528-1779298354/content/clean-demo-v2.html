<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Roboto', sans-serif; background: #fff; color: #111827; }
.demo { display: flex; min-height: 420px; }
.sidebar { width: 220px; background: #f9fafb; border-right: 1px solid #e5e7eb; padding: 24px 16px; flex-shrink: 0; }
.logo { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 18px; color: #111827; margin-bottom: 32px; display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; background: #3b82f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { width: 18px; height: 18px; stroke: white; stroke-width: 2; fill: none; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; font-size: 14px; color: #6b7280; margin-bottom: 2px; cursor: default; transition: all 0.15s; }
.nav-item:hover { background: #f3f4f6; }
.nav-item.active { background: #eff6ff; color: #3b82f6; font-weight: 500; }
.nav-item svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.5; fill: none; flex-shrink: 0; }
.content { flex: 1; padding: 24px 32px; }
.topbar { display: flex; justify-content: flex-end; align-items: center; padding: 8px 32px; border-bottom: 1px solid #e5e7eb; gap: 16px; }
.topbar-time { font-size: 13px; color: #9ca3af; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: #3b82f6; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 500; }
h1 { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 24px; color: #111827; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; background: #fff; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-icon { width: 36px; height: 36px; border-radius: 10px; background: #eff6ff; display: flex; align-items: center; justify-content: center; }
.card-icon svg { width: 18px; height: 18px; stroke: #3b82f6; stroke-width: 1.5; fill: none; }
.card-label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
.card-value { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 600; color: #111827; }
.bar { height: 6px; background: #e5e7eb; border-radius: 3px; margin-top: 10px; }
.bar-fill { height: 6px; background: #3b82f6; border-radius: 3px; width: 45%; }
.status-item { font-size: 14px; padding: 4px 0; color: #374151; display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #16a34a; display: inline-block; }
.info-text { font-size: 14px; color: #374151; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #9ca3af; margin-bottom: 16px; display: block; padding: 8px 16px 0; }
</style>
</head>
<body>
<span class="label">NAS Portal — Clean Style Preview</span>
<div class="demo">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
      NAS
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      仪表盘
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      文件
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      媒体
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      照片
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      设置
    </div>
  </div>
  <div style="flex:1">
    <div class="topbar">
      <span class="topbar-time">在线 · 192.168.1.46</span>
      <div class="avatar">E</div>
    </div>
    <div class="content">
      <h1>仪表盘</h1>
      <p class="subtitle">系统状态总览 · NAS-Data</p>
      <div class="grid">
        <div class="card">
          <div class="card-header">
            <div class="card-label">硬盘</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></div>
          </div>
          <div class="card-value">1.2 / 2.7 TB</div>
          <div class="bar"><div class="bar-fill"></div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-label">服务</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><path d="M6 6h.01M6 18h.01"/></svg></div>
          </div>
          <div class="status-item"><span class="dot"></span>SMB</div>
          <div class="status-item"><span class="dot"></span>Jellyfin</div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-label">网络</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
          </div>
          <div class="info-text" style="font-weight:500">192.168.1.46</div>
          <div class="card-label" style="margin-top:8px">已连接</div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-label">最近备份</div>
            <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
          </div>
          <div class="info-text">昨天 · 42 张照片</div>
          <div class="card-label" style="margin-top:8px">自动备份进行中</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
