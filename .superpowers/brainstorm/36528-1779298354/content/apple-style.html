<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #fbfbfd; color: #1d1d1f; -webkit-font-smoothing: antialiased; }
.demo { display: flex; min-height: 480px; }

/* Sidebar */
.sidebar { width: 240px; background: #fff; padding: 32px 20px; flex-shrink: 0; }
.logo { font-size: 20px; font-weight: 700; color: #1d1d1f; margin-bottom: 36px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 28px; height: 28px; background: #0071e3; border-radius: 7px; }
.nav-label { font-size: 11px; font-weight: 600; color: #86868b; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px; margin-top: 24px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 8px; font-size: 14px; color: #86868b; margin-bottom: 2px; cursor: default; }
.nav-item.active { color: #0071e3; background: #f5f5f7; font-weight: 500; }
.nav-item svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.5; fill: none; flex-shrink: 0; }

/* Top bar */
.topbar { display: flex; justify-content: flex-end; align-items: center; padding: 12px 40px; gap: 16px; }
.topbar-time { font-size: 12px; color: #86868b; font-weight: 500; }
.avatar { width: 28px; height: 28px; background: #0071e3; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 600; }

/* Content */
.main-area { flex: 1; }
.content { padding: 8px 40px 40px; }
h1 { font-size: 40px; font-weight: 700; color: #1d1d1f; letter-spacing: -1px; margin-bottom: 4px; }
.subtitle { font-size: 16px; color: #86868b; font-weight: 400; margin-bottom: 32px; }

/* Premium cards */
.row { display: flex; gap: 20px; }
.card { flex: 1; background: #fff; border-radius: 18px; padding: 24px; }
.card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.card-icon { width: 36px; height: 36px; border-radius: 10px; background: #f5f5f7; display: flex; align-items: center; justify-content: center; }
.card-icon svg { width: 18px; height: 18px; stroke: #0071e3; stroke-width: 1.5; fill: none; }
.card-label { font-size: 13px; font-weight: 600; color: #86868b; }
.card-value { font-size: 28px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.5px; }
.card-detail { font-size: 13px; color: #86868b; margin-top: 6px; }

/* Bar */
.bar-track { height: 4px; background: #e8e8ed; border-radius: 2px; margin-top: 12px; }
.bar-fill { height: 4px; background: #0071e3; border-radius: 2px; width: 45%; }

/* Status */
.status { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.status-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #1d1d1f; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #30d158; }

/* Divider */
.divider { height: 1px; background: #e8e8ed; margin: 24px 0; }

/* Label */
.tag { display: inline-block; font-size: 11px; font-weight: 600; color: #86868b; letter-spacing: 0.3px; margin-bottom: 12px; }
</style>
</head>
<body>
<span class="tag" style="padding: 12px 24px 0">NAS Portal · Apple‑inspired Preview</span>
<div class="demo">
  <div class="sidebar">
    <div class="logo"><div class="logo-dot"></div>NAS</div>
    <div class="nav-label">Menu</div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      Files
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      Media
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Photos
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </div>
  </div>
  <div class="main-area">
    <div class="topbar">
      <span class="topbar-time">192.168.1.46</span>
      <div class="avatar">E</div>
    </div>
    <div class="content">
      <h1>Good evening.</h1>
      <p class="subtitle">NAS‑Data is up and running.</p>
      <div class="row">
        <div class="card">
          <div class="card-header">
            <div class="card-icon"><svg viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></div>
            <span class="card-label">Storage</span>
          </div>
          <div class="card-value">1.2 TB</div>
          <div class="card-detail">of 2.7 TB used</div>
          <div class="bar-track"><div class="bar-fill"></div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg></div>
            <span class="card-label">Services</span>
          </div>
          <div class="status">
            <div class="status-row"><span class="status-dot"></span>SMB</div>
            <div class="status-row"><span class="status-dot"></span>Jellyfin</div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-icon"><svg viewBox="0 0 24 24" fill="none"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
            <span class="card-label">Network</span>
          </div>
          <div class="card-value" style="font-size:20px">192.168.1.46</div>
          <div class="card-detail">Connected</div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
            <span class="card-label">Latest Backup</span>
          </div>
          <div class="card-value" style="font-size:20px">42 photos</div>
          <div class="card-detail">Yesterday</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
