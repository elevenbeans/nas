<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Roboto', -apple-system, sans-serif; background: #fbfbfd; color: #1d1d1f; -webkit-font-smoothing: antialiased; }

/* Top Nav */
.topnav { display: flex; align-items: center; padding: 0 32px; height: 56px; background: #fff; border-bottom: 1px solid #f0f0f2; position: sticky; top: 0; z-index: 50; }
.topnav-logo { display: flex; align-items: center; gap: 10px; margin-right: 32px; }
.logo-box { width: 26px; height: 26px; background: #3b82f6; border-radius: 6px; }
.logo-text { font-family: 'Poppins', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.nav-links { display: flex; gap: 4px; }
.nav-links a { text-decoration: none; font-size: 13px; font-weight: 500; color: #86868b; padding: 8px 14px; border-radius: 6px; transition: all .2s; }
.nav-links a:hover { color: #1d1d1f; background: #f5f5f7; }
.nav-links a.active { color: #3b82f6; background: #eff6ff; font-weight: 600; }
.topnav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.topnav-ip { font-size: 12px; color: #86868b; font-weight: 500; }
.topnav-avatar { width: 28px; height: 28px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 600; font-family: 'Poppins', sans-serif; }

/* Hamburger */
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 6px; }
.hamburger span { display: block; width: 20px; height: 2px; background: #1d1d1f; border-radius: 1px; transition: all .25s; }

/* Mobile drawer */
.drawer-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 98; }
.drawer { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: #fff; z-index: 99; padding: 24px; transition: right .3s; box-shadow: -2px 0 20px rgba(0,0,0,.08); }
.drawer.open { right: 0; }
.drawer-bg.show { display: block; }

.drawer-logo { font-family: 'Poppins', sans-serif; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.drawer a { display: block; text-decoration: none; font-size: 15px; font-weight: 500; color: #86868b; padding: 12px 12px; border-radius: 8px; margin-bottom: 4px; }
.drawer a.active { color: #3b82f6; background: #eff6ff; font-weight: 600; }
.drawer-close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 24px; color: #86868b; cursor: pointer; padding: 4px; }

/* Content */
.content { max-width: 1120px; margin: 0 auto; padding: 32px 32px 64px; }
h1 { font-family: 'Poppins', sans-serif; font-size: 40px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; }
.subtitle { font-size: 16px; color: #86868b; margin-bottom: 32px; }

.row { display: flex; gap: 20px; }
.card { flex: 1; background: #fff; border-radius: 18px; padding: 24px; }
.card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.card-icon { width: 36px; height: 36px; border-radius: 10px; background: #f5f5f7; display: flex; align-items: center; justify-content: center; }
.card-icon svg { width: 18px; height: 18px; stroke: #3b82f6; stroke-width: 1.5; fill: none; }
.card-label { font-size: 13px; font-weight: 600; color: #86868b; font-family: 'Poppins', sans-serif; }
.card-value { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.card-detail { font-size: 13px; color: #86868b; margin-top: 6px; }
.bar-track { height: 4px; background: #e8e8ed; border-radius: 2px; margin-top: 12px; }
.bar-fill { height: 4px; background: #3b82f6; border-radius: 2px; width: 45%; }
.status { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.status-row { display: flex; align-items: center; gap: 10px; font-size: 14px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; }

@media (max-width: 768px) {
  .nav-links { display: none; }
  .hamburger { display: flex; }
  .topnav-ip { display: none; }
  .content { padding: 24px 16px 48px; }
  h1 { font-size: 28px; }
  .row { flex-direction: column; }
  .topnav { padding: 0 16px; }
}
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="topnav">
  <div class="topnav-logo">
    <div class="logo-box"></div>
    <span class="logo-text">NAS</span>
  </div>
  <div class="nav-links">
    <a href="#" class="active">Overview</a>
    <a href="#">Files</a>
    <a href="#">Media</a>
    <a href="#">Photos</a>
    <a href="#">Settings</a>
  </div>
  <div class="topnav-right">
    <span class="topnav-ip">192.168.1.46</span>
    <div class="topnav-avatar">E</div>
    <button class="hamburger" onclick="toggleDrawer()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Drawer overlay + Drawer -->
<div class="drawer-bg" id="drawerBg" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="toggleDrawer()">&times;</button>
  <div class="drawer-logo"><div class="logo-box"></div>NAS</div>
  <a href="#" class="active">Overview</a>
  <a href="#">Files</a>
  <a href="#">Media</a>
  <a href="#">Photos</a>
  <a href="#">Settings</a>
</div>

<!-- Content -->
<div class="content">
  <h1>Good evening.</h1>
  <p class="subtitle">NAS‑Data is up and running.</p>
  <div class="row">
    <div class="card">
      <div class="card-header">
        <div class="card-icon"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></div>
        <span class="card-label">Storage</span>
      </div>
      <div class="card-value">1.2 TB</div>
      <div class="card-detail">of 2.7 TB used</div>
      <div class="bar-track"><div class="bar-fill"></div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-icon"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg></div>
        <span class="card-label">Services</span>
      </div>
      <div class="status">
        <div class="status-row"><span class="status-dot"></span>SMB</div>
        <div class="status-row"><span class="status-dot"></span>Jellyfin</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <span class="card-label">Network</span>
      </div>
      <div class="card-value" style="font-size:20px">192.168.1.46</div>
      <div class="card-detail">Connected</div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
        <span class="card-label">Latest Backup</span>
      </div>
      <div class="card-value" style="font-size:20px">42 photos</div>
      <div class="card-detail">Yesterday</div>
    </div>
  </div>
</div>

<script>
function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('drawerBg').classList.toggle('show');
}
</script>
</body>
</html>
