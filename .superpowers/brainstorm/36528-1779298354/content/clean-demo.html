<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Roboto', sans-serif; background: #fff; color: #111827; }
.demo { display: flex; min-height: 400px; }
.sidebar { width: 200px; background: #f9fafb; border-right: 1px solid #e5e7eb; padding: 24px 16px; flex-shrink: 0; }
.logo { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 16px; color: #111827; margin-bottom: 28px; letter-spacing: -0.3px; }
.nav-item { padding: 8px 12px; border-radius: 6px; font-size: 14px; color: #6b7280; margin-bottom: 2px; cursor: default; }
.nav-item.active { background: #eff6ff; color: #3b82f6; font-weight: 500; }
.content { flex: 1; padding: 24px 32px; }
h1 { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 24px; color: #111827; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
.card-label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.card-value { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 600; color: #111827; }
.bar { height: 6px; background: #e5e7eb; border-radius: 3px; margin-top: 10px; }
.bar-fill { height: 6px; background: #3b82f6; border-radius: 3px; width: 45%; }
.status-item { font-size: 14px; padding: 3px 0; color: #374151; }
.status-item .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #16a34a; margin-right: 8px; }
.info-text { font-size: 14px; color: #374151; }
.topbar { display: flex; justify-content: flex-end; padding: 8px 32px; border-bottom: 1px solid #e5e7eb; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: #3b82f6; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 500; }
.label { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #9ca3af; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="label" style="padding: 8px 16px 0">NAS Portal — Clean Style Preview</div>
<div class="demo">
  <div class="sidebar">
    <div class="logo">📡 NAS</div>
    <div class="nav-item active">📊 仪表盘</div>
    <div class="nav-item">📁 文件</div>
    <div class="nav-item">🎬 媒体</div>
    <div class="nav-item">📸 照片</div>
    <div class="nav-item">⚙️ 设置</div>
  </div>
  <div style="flex:1">
    <div class="topbar">
      <div class="avatar">E</div>
    </div>
    <div class="content">
      <h1>仪表盘</h1>
      <p class="subtitle">NAS 系统状态总览</p>
      <div class="grid">
        <div class="card">
          <div class="card-label">硬盘</div>
          <div class="card-value">1.2 / 2.7 TB</div>
          <div class="bar"><div class="bar-fill"></div></div>
        </div>
        <div class="card">
          <div class="card-label">服务</div>
          <div class="status-item"><span class="dot"></span>SMB</div>
          <div class="status-item"><span class="dot"></span>Jellyfin</div>
        </div>
        <div class="card">
          <div class="card-label">网络</div>
          <div class="info-text" style="font-family:'Poppins',sans-serif;font-weight:500">192.168.1.46</div>
        </div>
        <div class="card">
          <div class="card-label">最近备份</div>
          <div class="info-text">昨天 · 42 张照片</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
